<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header>
      <h1 class="container-fluid text-center bg-warning text-light p-4">
        Personajes de Los Simpson
      </h1>
      <nav class="d-flex justify-content-center align-items-center gap-2 p-4">
        <input
          type="text"
          class="form-control bg-body text-body border-secondary w-25"
          placeholder="Buscar personaje..."
          id="busquedaPersonaje"
        />
        <button
          class="btn btn-warning fw-bold text-dark px-4"
          type="button"
          id="buscarClick"
        >
          Buscar
        </button>
      </nav>
    </header>
    <main>
      <div class="card">
        <div class="row" id="cardPersonaje"></div>
      </div>
      <div
        class="modal fade"
        id="modalDetalle"
        tabindex="-1"
        aria-labelledby="modalDetalleLabel"
        aria-hidden="true"
      >
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="modalNombrePersonaje">
                Nombre del Personaje
              </h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body text-center" id="modalCuerpo">
              <img
                src=""
                id="modalImagen"
                class="img-fluid rounded mb-3 shadow"
                alt="Imagen del personaje"
                style="max-height: 300px; object-fit: contain"
              />
              <ul class="list-group list-group-flush text-start">
                <li class="list-group-item">
                  <strong>Edad y Nacimiento:</strong>
                  <span id="modalEdadNacimiento"></span>
                </li>
                <li class="list-group-item">
                  <strong>Género:</strong> <span id="modalGenero"></span>
                </li>
                <li class="list-group-item">
                  <strong>Ocupación:</strong> <span id="modalOcupacion"></span>
                </li>
                <li class="list-group-item">
                  <strong>Estado:</strong> <span id="modalEstado"></span>
                </li>
              </ul>
              <div
                class="mt-3 p-3 bg-light rounded italic shadow-sm border-start border-primary border-4 text-start"
              >
                <p class="mb-0 text-muted">
                  <i class="bi bi-chat-quote-fill"></i>
                  <span id="modalFrase"></span>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer></footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
