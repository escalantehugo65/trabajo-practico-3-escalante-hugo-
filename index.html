<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header>
      <h1 class="container-fluid text-center bg-warning text-light p-4">
        Personajes de Los Simpson
      </h1>
      <nav class="d-flex justify-content-center align-items-center gap-2 p-4">
        <input
          type="text"
          class="form-control bg-body text-body border-secondary w-25"
          placeholder="Buscar personaje..."
          id="busquedaPersonaje"
        />
        <button class="btn btn-warning fw-bold text-dark px-4" type="button" id="buscarClick">
          Buscar
        </button>
      </nav>
    </header>
    <main>
      <div class="card">
        <div class="row" id="cardPersonaje"></div>
      </div>
    </main>
    <footer></footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
